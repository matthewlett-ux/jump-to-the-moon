<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jump to the Moon</title>
    <style>
        :root {
            --bg-color: #050510;       
            --panel-bg: #0a0f1e;       
            --text-main: #ffffff;      
            --border-heavy: #ffffff;   
            --shadow-color: #2a3454;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "Arial Black", "Impact", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-transform: uppercase;
            overflow: hidden; 
            
            background-image: radial-gradient(#2a3454 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0;
        }

        .page-title {
            font-size: 56px;
            font-weight: 900;
            color: #ffcc00; 
            text-shadow: 4px 4px 0px #ff3366, 8px 8px 0px #000;
            margin: 0 0 20px 0;
            text-align: center;
            letter-spacing: 2px;
            position: relative;
            z-index: 10;
            -webkit-text-stroke: 2px #000; 
        }

        .dashboard {
            width: 850px;
            background: var(--panel-bg);
            border-radius: 16px;
            padding: 30px 40px;
            border: 4px solid var(--border-heavy);
            box-shadow: 16px 16px 0px #00e5ff; 
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: relative;
            z-index: 10; 
        }

        .hud {
            text-align: center;
            background: #000;
            border-radius: 12px;
            padding: 25px;
            border: 4px solid var(--border-heavy);
            box-shadow: inset 6px 6px 0px #1a1f33;
            transition: all 0.2s ease;
            position: relative;
        }

        .timer-display {
            font-size: 64px;
            font-weight: 900;
            color: #ff3366;
            margin-bottom: 10px;
            text-shadow: 4px 4px 0px #000;
            letter-spacing: 4px;
        }
        
        .hud-subtitle {
            font-size: 18px;
            color: #00e5ff; 
            letter-spacing: 4px;
            margin-bottom: 10px;
            font-weight: 900;
        }
        
        .hud-title {
            font-size: 40px;
            font-weight: 900;
            margin: 0;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 4px 4px 0px #ff3366;
        }

        .progress-container {
            width: 100%;
            height: 24px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
            border: 3px solid var(--border-heavy);
        }
        
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #00e5ff; 
            transition: width 0.1s cubic-bezier(0.4, 0, 0.2, 1); 
            border-right: 3px solid var(--border-heavy);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            padding: 14px 40px;
            border-radius: 8px;
            font-size: 18px;
            font-family: inherit;
            font-weight: 900;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.1s;
            text-transform: uppercase;
        }

        .btn-connect {
            background: #ffcc00;
            color: #000;
            border: 3px solid var(--border-heavy);
            box-shadow: 6px 6px 0px #000;
        }

        .btn-start {
            background: #00e5ff;
            color: #000;
            border: 3px solid var(--border-heavy);
            box-shadow: 6px 6px 0px #000;
        }

        .btn-reset {
            background: #ff3366;
            color: #fff;
            border: 3px solid var(--border-heavy);
            box-shadow: 6px 6px 0px #000;
        }

        .btn:hover:not(:disabled) {
            transform: translate(2px, 2px);
            box-shadow: 4px 4px 0px #000;
        }

        .btn:disabled {
            background: #2a3454;
            color: #8b9bb4;
            border-color: #2a3454;
            box-shadow: none;
            cursor: not-allowed;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .panel {
            background: var(--panel-bg);
            border: 3px solid #2a3454;
            border-radius: 8px;
            padding: 20px 10px; 
            text-align: center;
            font-weight: 900;
            font-size: 16px; 
            color: #8b9bb4;
            transition: all 0.1s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
            --theme-color: #fff; 
            box-shadow: 6px 6px 0px #2a3454;
        }

        .panel-id {
            font-size: 28px; 
            color: var(--theme-color);
            opacity: 0.5;
        }

        .panel.target {
            border-color: var(--theme-color);
            color: #fff;
            background: #111a33;
            box-shadow: 6px 6px 0px var(--theme-color);
        }
        .panel.target .panel-id {
            opacity: 1;
        }

        .panel.hit {
            background: var(--theme-color);
            color: #000;
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px var(--theme-color);
        }
        .panel.hit .panel-id {
            color: #000;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0px;
            font-size: 14px;
            color: var(--border-heavy);
            letter-spacing: 1px;
            font-weight: 900;
        }
        
        .status-dot {
            display: inline-block;
            width: 14px;
            height: 14px;
            background: #ff3366; 
            margin-right: 10px;
            border: 2px solid var(--border-heavy);
        }
    </style>
</head>
<body>

    <h1 class="page-title">JUMP TO THE MOON</h1>

    <div class="dashboard">
        <div class="hud" id="hud">
            <div class="timer-display" id="timer">02:00</div>
            <div class="hud-subtitle" id="hud-sub">MISSION TELEMETRY: OFFLINE</div>
            <div class="hud-title" id="hud-main">AWAITING CONNECTION</div>
            <div class="progress-container">
                <div class="progress-bar" id="prog-bar"></div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-connect" id="btn-connect">CONNECT HARDWARE</button>
            <button class="btn btn-start" id="btn-start" style="display:none;" disabled>INITIATE LAUNCH</button>
            <button class="btn btn-reset" id="btn-reset">ABORT</button>
        </div>

        <div class="grid" id="panel-grid"></div>

        <div class="footer">
            <div><span class="status-dot" id="conn-dot"></span><span id="conn-text">MICRO:BIT COMMS: DISCONNECTED</span></div>
            <div>ASTRONAUT FITNESS AI V3.0</div>
        </div>
    </div>

    <script>
        // Updated to the 4 specific exercises. 
        // hitsNeeded controls how many reps they must do before the AI picks a new random exercise.
        const ACTIVITIES = [
            { id: "1", name: "Star Jumps",       color: "#ffcc00", hitsNeeded: 8 }, 
            { id: "2", name: "Rocket Sprints",   color: "#33ff77", hitsNeeded: 12 }, 
            { id: "3", name: "Cryo-Rest",        color: "#00e5ff", hitsNeeded: 4 },  
            { id: "4", name: "Asteroid Squats",  color: "#ff3366", hitsNeeded: 8 } 
        ];

        const grid = document.getElementById('panel-grid');
        const hudMain = document.getElementById('hud-main');
        const hudSub = document.getElementById('hud-sub');
        const progBar = document.getElementById('prog-bar');
        const hudBox = document.getElementById('hud');
        const timerDisplay = document.getElementById('timer');
        
        const btnConnect = document.getElementById('btn-connect');
        const btnStart = document.getElementById('btn-start');
        const btnReset = document.getElementById('btn-reset');
        
        const connDot = document.getElementById('conn-dot');
        const connText = document.getElementById('conn-text');

        const panels = {};
        let currentTarget = null;
        let currentHits = 0;
        let totalScore = 0;
        let isTransitioning = false; 
        
        // Timer Variables
        let timeLeft = 120; // 2 minutes in seconds
        let timerInterval = null;
        let isWorkoutActive = false;

        // Initialize panels
        ACTIVITIES.forEach(act => {
            const div = document.createElement('div');
            div.className = 'panel';
            div.style.setProperty('--theme-color', act.color); 
            div.innerHTML = `<div class="panel-id">CH ${act.id}</div><div>${act.name}</div>`;
            grid.appendChild(div);
            panels[act.id] = div;
        });

        // --- Audio Setup (Kept from previous version) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function unlockAudio() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playBeep(isSuccess) {
            if (audioCtx.state === 'suspended') return;
            const now = audioCtx.currentTime;
            
            if (isSuccess) {
                const notes = [440, 554.37, 659.25, 880]; 
                notes.forEach((freq, index) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'square'; 
                    osc.frequency.value = freq;
                    
                    const startTime = now + (index * 0.12);
                    const stopTime = startTime + 0.2; 
                    
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(0.4, startTime + 0.02); 
                    gain.gain.exponentialRampToValueAtTime(0.001, stopTime); 
                    
                    osc.start(startTime);
                    osc.stop(stopTime);
                });
            } else {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sawtooth'; 
                osc.frequency.setValueAtTime(1500, now);
                osc.frequency.exponentialRampToValueAtTime(40, now + 0.25);
                gain.gain.setValueAtTime(0.6, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            }
        }

        // --- Timer Functions ---
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateTimer() {
            timeLeft--;
            timerDisplay.innerText = formatTime(timeLeft);
            
            if (timeLeft <= 30) {
                timerDisplay.style.color = "#ffcc00"; // Yellow warning
            }
            if (timeLeft <= 10) {
                timerDisplay.style.color = "#ff3366"; // Red warning
            }

            if (timeLeft <= 0) {
                endWorkout();
            }
        }

        // --- Game Logic ---
        function startCircuit() {
            unlockAudio();
            btnStart.disabled = true; 
            isWorkoutActive = true;
            totalScore = 0;
            timeLeft = 120;
            timerDisplay.style.color = "#00e5ff";
            timerDisplay.innerText = formatTime(timeLeft);
            
            timerInterval = setInterval(updateTimer, 1000);
            startNewChallenge();
        }

        function endWorkout() {
            clearInterval(timerInterval);
            isWorkoutActive = false;
            isTransitioning = true;
            currentTarget = null;
            
            playBeep(true);
            Object.values(panels).forEach(p => p.classList.remove('target', 'hit'));
            
            hudSub.innerText = "TIME'S UP! MISSION COMPLETE";
            hudMain.innerText = `TOTAL REPS: ${totalScore}`;
            hudMain.style.color = "#33ff77";
            hudBox.style.borderColor = "#33ff77";
            progBar.style.width = '100%';
            progBar.style.background = "#33ff77";
            
            btnStart.innerText = "LAUNCH AGAIN";
            btnStart.disabled = false;
        }

        function resetWorkout() {
            unlockAudio();
            clearInterval(timerInterval);
            isWorkoutActive = false;
            isTransitioning = false;
            currentTarget = null;
            totalScore = 0;
            timeLeft = 120;
            
            timerDisplay.innerText = "02:00";
            timerDisplay.style.color = "#ff3366";
            progBar.style.width = '0%';
            
            hudSub.innerText = "MISSION ABORTED";
            hudMain.innerText = "AWAITING COMMAND";
            hudMain.style.color = "var(--text-main)";
            hudMain.style.textShadow = "4px 4px 0px #ff3366";
            hudBox.style.borderColor = "var(--border-heavy)";
            
            Object.values(panels).forEach(p => p.classList.remove('target', 'hit'));
            if (port) btnStart.disabled = false;
        }

        function startNewChallenge() {
            isTransitioning = false;
            currentHits = 0;
            progBar.style.width = '0%';
            
            Object.values(panels).forEach(p => p.classList.remove('target', 'hit'));

            // Pick a random exercise, ensuring it's not the exact same one twice in a row
            let newTarget;
            do {
                newTarget = ACTIVITIES[Math.floor(Math.random() * ACTIVITIES.length)];
            } while (newTarget === currentTarget && ACTIVITIES.length > 1);
            
            currentTarget = newTarget;

            hudSub.innerText = `SCORE: ${totalScore} | ACTIVE EXERCISE`;
            hudMain.innerText = `EXECUTE: ${currentTarget.name}`;
            hudMain.style.color = currentTarget.color;
            hudMain.style.textShadow = `4px 4px 0px #000`;
            progBar.style.background = currentTarget.color;
            
            panels[currentTarget.id].classList.add('target');
        }

        function handleInput(msg) {
            if (!isWorkoutActive || isTransitioning || !currentTarget) return; 
            
            const detectedId = msg.toString().trim();
            
            if (detectedId === currentTarget.id) {
                currentHits++;
                totalScore++; 
                playBeep(false); 

                const panel = panels[detectedId];
                panel.classList.add('hit');
                setTimeout(() => panel.classList.remove('hit'), 150);

                const percent = (currentHits / currentTarget.hitsNeeded) * 100;
                progBar.style.width = `${percent}%`;
                hudSub.innerText = `SCORE: ${totalScore} | ACTIVE EXERCISE`;

                if (currentHits >= currentTarget.hitsNeeded) {
                    isTransitioning = true;
                    playBeep(true); 
                    
                    hudMain.innerText = "PHASE COMPLETE";
                    hudMain.style.color = "#33ff77"; 
                    hudMain.style.textShadow = "4px 4px 0px #000";
                    hudBox.style.borderColor = "#33ff77";
                    
                    setTimeout(() => {
                        if (isWorkoutActive) {
                            hudBox.style.borderColor = "var(--border-heavy)";
                            startNewChallenge();
                        }
                    }, 1000); // Short delay before picking the next random exercise
                }
            }
        }

        // --- Serial Connection (Kept from previous version) ---
        let port;
        let reader;

        async function connectMicroBit() {
            unlockAudio();
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });

                connDot.style.background = "#33ff77";
                connText.innerText = "MICRO:BIT COMMS: SECURED";
                btnConnect.style.display = 'none';
                btnStart.style.display = 'inline-block';
                
                if (!isWorkoutActive) {
                    btnStart.disabled = false;
                    hudSub.innerText = "SYSTEMS NOMINAL";
                    hudMain.innerText = "READY FOR LAUNCH";
                }

                const textDecoder = new TextDecoderStream();
                const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
                reader = textDecoder.readable.getReader();

                let buffer = "";
                while (port.readable) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += value;
                    let lines = buffer.split('\n');
                    buffer = lines.pop(); 
                    
                    for (let line of lines) {
                        if (line.trim().length > 0) {
                            handleInput(line);
                        }
                    }
                }
            } catch (error) {
                console.error("Connection failed:", error);
                connDot.style.background = "#ff3366";
                connText.innerText = "CONNECTION FAILED";
            }
        }

        btnConnect.addEventListener('click', connectMicroBit);
        btnStart.addEventListener('click', startCircuit);
        btnReset.addEventListener('click', resetWorkout);

    </script>
</body>
</html>
